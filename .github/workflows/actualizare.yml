name: Actualizare Automata

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Copiaza codul
        uses: actions/checkout@v3

      - name: Configurare Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Instaleaza feedparser
        run: pip install feedparser

      - name: Ruleaza scriptul
        run: python scraper.py

      - name: Salveaza modificarile
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add stiri.json
          git commit -m "Auto-update stiri" || echo "Nu sunt modificari"
          git push
