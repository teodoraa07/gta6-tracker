name: Actualizare Automata Stiri GTA 6

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Copiază codul site-ului
      uses: actions/checkout@v3

    - name: Configurează Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Instalează librăriile necesare
      run: |
        python -m pip install --upgrade pip
        pip install feedparser

    - name: Rulează Robotul Scraper
      run: python scraper.py

    - name: Salvează modificările în stiri.json pe internet
      run: |
        git config --global user.name "GTA 6 Tracker Bot"
        git config --global user.email "bot@gta6tracker.com"
        git add stiri.json
        git commit -m "Actualizare automată știri" || exit 0
        git push
