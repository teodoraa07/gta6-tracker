<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA VI - Noutăți și Evenimente Directe</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen font-sans">

<!-- HEADER INTERACTIV -->
<header class="border-b border-zinc-800 bg-zinc-900/80 backdrop-blur sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
        <h1 class="text-2xl font-black tracking-wider text-amber-500 uppercase">GTA VI <span class="text-white text-sm font-normal tracking-normal block sm:inline sm:ml-2">Hub Oficial</span></h1>
        <div class="bg-zinc-950 border border-zinc-800 px-4 py-2 rounded-lg text-amber-400 font-mono font-bold text-sm shadow-inner">
            Lansare: <span id="countdown">146z : 18h : 16m : 30s</span>
        </div>
    </div>
</header>

<!-- ZONA DE CONȚINUT -->
<main class="max-w-6xl mx-auto px-4 py-8">
    <div class="mb-8">
        <h2 class="text-3xl font-extrabold tracking-tight mb-2">Evenimente și Noutăți Majore</h2>
        <p class="text-zinc-400 text-sm">Toate actualizările importante pot fi citite integral direct pe această pagină.</p>
    </div>

    <div id="container-stiri" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Știrile generate din Python vor fi plasate automat aici -->
    </div>
</main>

<!-- FEREASTRĂ MODALĂ (POP-UP DIRECT PE SITE) -->
<div id="fereastra-citire" class="fixed inset-0 bg-black/85 backdrop-blur-sm hidden justify-center items-center z-50 p-4 animate-fade-in">
    <div class="bg-zinc-900 border border-zinc-800 rounded-xl max-w-2xl w-full max-h-[85vh] overflow-y-auto p-6 relative shadow-2xl">
        <button onclick="inchideArticol()" class="absolute top-4 right-4 bg-zinc-800 hover:bg-amber-500 hover:text-black text-white font-bold h-8 w-8 rounded-full text-xs flex items-center justify-center transition-colors cursor-pointer">✕</button>
        <img id="modal-imagine" src="" class="w-full h-56 object-cover rounded-lg mb-4 border border-zinc-800">
        <span id="modal-data" class="text-xs text-amber-500 font-mono"></span>
        <h3 id="modal-titlu" class="text-2xl font-black my-3 text-zinc-100 leading-tight"></h3>
        <p id="modal-continut" class="text-zinc-300 leading-relaxed text-base border-t border-zinc-800 pt-4 whitespace-pre-line"></p>
    </div>
</div>

<script>
    let stiriLocale = [];

    function pornesteCountdown() {
        // Sincronizare perfectă cu timpul tău rămas
        const acum = new Date().getTime();
        const timpRamas = (146 * 24 * 60 * 60 * 1000) + (18 * 60 * 60 * 1000) + (16 * 60 * 1000) + (30 * 1000);
        const dataTinta = acum + timpRamas;

        setInterval(() => {
            const distanta = dataTinta - new Date().getTime();
            const zile = Math.floor(distanta / (1000 * 60 * 60 * 24));
            const ore = Math.floor((distanta % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minute = Math.floor((distanta % (1000 * 60 * 60)) / (1000 * 60));
            const secunde = Math.floor((distanta % (1000 * 60)) / 1000);
            document.getElementById("countdown").innerHTML = `${zile}z : ${ore.toString().padStart(2, '0')}h : ${minute.toString().padStart(2, '0')}m : ${secunde.toString().padStart(2, '0')}s`;
        }, 1000);
    }

    async function afiseazaStiriPeEcran() {
        try {
            const raspuns = await fetch('stiri.json?v=' + new Date().getTime());
            stiriLocale = await raspuns.json();
            const container = document.getElementById('container-stiri');
            container.innerHTML = '';

            stiriLocale.forEach(articol => {
                const card = document.createElement('div');
                card.className = "bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden hover:border-amber-500/40 transition-all duration-300 flex flex-col group shadow-lg";
                card.innerHTML = `
                        <div class="h-44 overflow-hidden bg-zinc-800">
                            <img src="${articol.imagine}" class="w-full h-full object-cover group-hover:scale-102 transition-transform duration-300">
                        </div>
                        <div class="p-5 flex flex-col flex-grow">
                            <span class="text-xs text-zinc-500 mb-2 font-mono">${articol.data}</span>
                            <h3 class="text-base font-bold mb-4 text-zinc-100 group-hover:text-amber-400 transition-colors line-clamp-2">${articol.titlu}</h3>
                            <button onclick="deschideArticol('${articol.id}')" class="w-full text-center bg-zinc-800 hover:bg-amber-500 hover:text-black font-bold text-xs py-2.5 px-4 rounded-lg transition-colors mt-auto cursor-pointer">
                                Citește noutatea pe site
                            </button>
                        </div>
                    `;
                container.appendChild(card);
            });
        } catch (e) {
            document.getElementById('container-stiri').innerHTML = '<div class="text-zinc-500 col-span-full text-center py-8">Eroare la încărcarea articolelor.</div>';
        }
    }

    function deschideArticol(idArticol) {
        const articol = stiriLocale.find(a => a.id === idArticol);
        if(articol) {
            document.getElementById('modal-imagine').src = articol.imagine;
            document.getElementById('modal-data').innerText = articol.data;
            document.getElementById('modal-titlu').innerText = articol.titlu;
            document.getElementById('modal-continut').innerText = articol.continut;
            document.getElementById('fereastra-citire').style.display = 'flex';
        }
    }

    function inchideArticol() {
        document.getElementById('fereastra-citire').style.display = 'none';
    }

    pornesteCountdown();
    afiseazaStiriPeEcran();
</script>
</body>
</html>
