<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA VI - Noutăți și Evenimente Reale</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #1f2833;
            --accent-color: #ffb300;
            --text-color: #c5c6c7;
            --text-white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid var(--card-bg);
            margin-bottom: 40px;
        }

        header h1 {
            color: var(--text-white);
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        header h1 span {
            color: var(--accent-color);
        }

        .stiri-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        .stire-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .stire-card:hover {
            transform: translateY(-3px);
        }

        .stire-banner {
            width: 100%;
            height: 150px;
            background: linear-gradient(135deg, #121212 0%, #2c1654 50%, #ff007f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-bottom: 3px solid var(--accent-color);
        }

        .banner-text {
            color: var(--text-white);
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
            border: 2px solid var(--accent-color);
            padding: 5px 15px;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1;
        }

        .stire-continut {
            padding: 25px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .stire-data {
            font-size: 0.85rem;
            color: var(--accent-color);
            margin-bottom: 10px;
            font-weight: bold;
        }

        .stire-titlu {
            color: var(--text-white);
            font-size: 1.5rem;
            margin: 0 0 15px 0;
            line-height: 1.3;
        }

        .stire-text {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 20px;
            white-space: pre-line;
            flex-grow: 1;
        }

        .btn-citeste {
            display: inline-block;
            align-self: flex-start;
            background-color: transparent;
            color: var(--accent-color);
            border: 2px solid var(--accent-color);
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-citeste:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1><span>GTA VI</span> Tracker Știri Reale</h1>
            <p>Toate actualizările și detaliile importante preluate live din presa internațională.</p>
        </header>

        <main class="stiri-grid" id="stiri-container">
            <!-- Știrile se vor încărca din stiri.json -->
        </main>
    </div>

    <script>
        async function incarcaStiri() {
            const container = document.getElementById('stiri-container');
            try {
                const response = await fetch('stiri.json');
                if (!response.ok) throw new Error('Nu s-a putut încărca fișierul JSON');
                
                const stiri = await response.json();
                container.innerHTML = '';

                stiri.forEach(stire => {
                    const card = document.createElement('article');
                    card.className = 'stire-card';

                    // Curățăm textul dacă conține repetat sintagma simplă text de "Citește mai mult"
                    let continutCurat = stire.continut.replace("Citește mai mult", "").replace("Read more", "");

                    card.innerHTML = `
                        <div class="stire-banner">
                            <div class="banner-text">CONȚINUT ACTUAL</div>
                        </div>
                        <div class="stire-continut">
                            <div class="stire-data">${stire.data}</div>
                            <h2 class="stire-titlu">${stire.titlu}</h2>
                            <p class="stire-text">${continutCurat}</p>
                            <a href="${stire.link}" target="_blank" class="btn-citeste">Citește tot articolul cu detalii</a>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error(error);
                container.innerHTML = `<p style="color: red; text-align: center;">Se încarcă datele noi... Te rugăm să dai refresh (F5) în câteva momente.</p>`;
            }
        }

        window.addEventListener('DOMContentLoaded', incarcaStiri);
    </script>
</body>
</html>
