<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA VI - Noutăți și Evenimente</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #1f2833;
            --accent-color: #ffb300;
            --text-color: #c5c6c7;
            --text-white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid var(--card-bg);
            margin-bottom: 40px;
        }

        header h1 {
            color: var(--text-white);
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        header h1 span {
            color: var(--accent-color);
        }

        .stiri-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        .stire-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        .stire-card:hover {
            transform: translateY(-5s);
        }

        /* Banner vizual în loc de imagine externă */
        .stire-banner {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #121212 0%, #2c1654 50%, #ff007f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-bottom: 3px solid var(--accent-color);
        }

        .stire-banner::before {
            content: "GTA VI";
            font-size: 4rem;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.05);
            position: absolute;
            letter-spacing: 5px;
        }

        .banner-text {
            color: var(--text-white);
            font-size: 1.4rem;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 1;
            border: 2px solid var(--accent-color);
            padding: 5px 15px;
            background: rgba(0, 0, 0, 0.4);
        }

        .stire-continut {
            padding: 25px;
        }

        .stire-data {
            font-size: 0.85rem;
            color: var(--accent-color);
            margin-bottom: 10px;
            font-weight: bold;
        }

        .stire-titlu {
            color: var(--text-white);
            font-size: 1.6rem;
            margin: 0 0 15px 0;
            line-height: 1.3;
        }

        .stire-text {
            font-size: 1rem;
            line-height: 1.6;
            white-space: pre-line;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1><span>GTA VI</span> Hub Oficial Informații</h1>
            <p>Toate actualizările și ghidurile importante direct de pe serverul tău.</p>
        </header>

        <main class="stiri-grid" id="stiri-container">
            <!-- Știrile se vor încărca automat aici prin JavaScript -->
        </main>
    </div>

    <script>
        async function incarcaStiri() {
            const container = document.getElementById('stiri-container');
            try {
                // Încărcăm fișierul stiri.json local sau de pe GitHub Pages
                const response = await fetch('stiri.json');
                if (!response.ok) throw new Error('Nu s-a putut încărca fișierul JSON');
                
                const stiri = await response.json();
                container.innerHTML = '';

                stiri.forEach(stire => {
                    const card = document.createElement('article');
                    card.className = 'stire-card';

                    // Generăm o etichetă scurtă pentru banner în funcție de ID sau conținut
                    let eticheta = "NEWS";
                    if(stire.id.includes('0')) eticheta = "PRE-ORDER";
                    if(stire.id.includes('1')) eticheta = "EVENT BONUS";
                    if(stire.id.includes('2')) eticheta = "DLC / UPDATE";

                    card.innerHTML = `
                        <div class="stire-banner">
                            <div class="banner-text">${eticheta}</div>
                        </div>
                        <div class="stire-continut">
                            <div class="stire-data">${stire.data}</div>
                            <h2 class="stire-titlu">${stire.titlu}</h2>
                            <p class="stire-text">${stire.continut}</p>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error(error);
                container.innerHTML = `<p style="color: red; text-align: center;">Eroare la încărcarea datelor. Asigură-te că stiri.json există.</p>`;
            }
        }

        // Pornim funcția când se încarcă pagina
        window.addEventListener('DOMContentLoaded', incarcaStiri);
    </script>
</body>
</html>
